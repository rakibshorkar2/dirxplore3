name: iOS IPA Build

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get Version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //')
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "tag_name=v${VERSION%+*}" >> $GITHUB_OUTPUT

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS
        run: |
          # Build the iOS application bundle without codesigning
          flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          # The IPA needs a specific structure: a 'Payload' folder containing the '.app' bundle.
          mkdir -p build/ios/iphoneos/Payload
          cp -Rp build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          
          # Zip the Payload folder and name it .ipa
          cd build/ios/iphoneos
          zip -r -y DirXplore.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DirXplore-IPA
          path: build/ios/iphoneos/DirXplore.ipa

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/ios/iphoneos/DirXplore.ipa
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
