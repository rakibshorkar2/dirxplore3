name: iOS IPA Build

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS
        run: |
          # Strip Development Team requirement from the project file
          sed -i '' 's/DEVELOPMENT_TEAM = [^;]*;//g' ios/Runner.xcodeproj/project.pbxproj
          
          # Build the iOS application bundle without codesigning
          # Using --config-only first to ensure settings are applied
          flutter build ios --release --no-codesign

      - name: Create Payload and IPA
        run: |
          # The IPA needs a specific structure: a 'Payload' folder containing the '.app' bundle.
          mkdir -p Payload
          # Use recursive copy with permissions preserved to maintain bundle integrity
          cp -Rp build/ios/iphoneos/Runner.app Payload/
          
          # Zip with -y to preserve symbolic links (critical for Flutter frameworks)
          zip -r -y DirXplore.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DirXplore-IPA
          path: DirXplore.ipa

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: DirXplore.ipa
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
