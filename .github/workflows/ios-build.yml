name: iOS IPA Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS
        run: |
          # Build the iOS application bundle without codesigning
          flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          # The IPA needs a specific structure: a 'Payload' folder containing the '.app' bundle.
          # We take the '.app' produced by the flutter build command.
          mkdir -p build/ios/iphoneos/Payload
          cp -Rp build/ios/iphoneos/Runner.app build/ios/iphoneos/Payload/
          
          # Zip the Payload folder and name it .ipa
          cd build/ios/iphoneos
          zip -r -y DirXplore.ipa Payload
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: DirXplore-IPA
          path: build/ios/iphoneos/DirXplore.ipa
