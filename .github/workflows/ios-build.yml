name: iOS IPA Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS
        run: |
          # Create a custom config to bypass the Team ID check for unsigned builds
          echo "DEVELOPMENT_TEAM =" > build_config.xcconfig
          flutter build ios --release --no-codesign --config-only
          
          # Build using xcodebuild directly to ensure no-codesign works without a Team
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -xcconfig build_config.xcconfig \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            clean build
            
          # Prepare the build directory for the next step
          mkdir -p build/ios/iphoneos
          cp -Rp build/Release-iphoneos/Runner.app build/ios/iphoneos/

      - name: Create Payload and IPA
        run: |
          mkdir Payload
          cp -Rp build/ios/iphoneos/Runner.app Payload/
          zip -r -y DirXplore.ipa Payload
          mv DirXplore.ipa build/ios/iphoneos/
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: dirxplore-ipa
          path: build/ios/iphoneos/DirXplore.ipa
