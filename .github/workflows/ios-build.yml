name: iOS IPA Build

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          # Removing specific version to always use the latest stable

      - name: Install dependencies
        run: flutter pub get

      - name: Setup Fastlane
        run: |
          cd ios
          # Note: In a real scenario, you'd need certificates/profiles for sideloading
          # For a generic "build", we'll just try to build the archive.

      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign --archs=arm64

      - name: Create Payload and IPA
        run: |
          mkdir -p Payload
          cp -Rp build/ios/iphoneos/Runner.app Payload/
          # ditto is more reliable on macOS for preserving app bundle integrity
          ditto -c -k --sequesterRsrc --keepParent Payload DirXplore.ipa
          mv DirXplore.ipa build/ios/iphoneos/
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: dirxplore-ipa
          path: build/ios/iphoneos/DirXplore.ipa
