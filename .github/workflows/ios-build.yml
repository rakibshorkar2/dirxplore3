name: iOS IPA Build

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS
        run: |
          # Nuclear Option: Disable all code signing requirements in the Xcode project
          sed -i '' 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' ios/Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer";/CODE_SIGN_IDENTITY = "";/g' ios/Runner.xcodeproj/project.pbxproj
          
          # Inject disabling flags into the build process
          flutter build ios --release --no-codesign \
            --extra-gen-snapshot-options=--no-codesign \
            --build-name=1.1.5 \
            --build-number=1

      - name: Create Payload and IPA
        run: |
          # Ensure we are in a clean state
          rm -rf Payload DirXplore.ipa
          
          mkdir -p Payload
          # Use the actual build output path
          cp -Rp build/ios/iphoneos/Runner.app Payload/
          
          # Zip with symbolic links preserved
          zip -r -y DirXplore.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DirXplore-IPA
          path: DirXplore.ipa

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: DirXplore.ipa
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
